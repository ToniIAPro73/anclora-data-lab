name: CI

on:
  pull_request:
    branches: [development, staging, production]
  push:
    branches: [development, staging, production, main]

env:
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  DATABASE_URL: "postgresql://user:password@localhost:5432/datalab_ci"
  NEXT_PUBLIC_DATALAB_DEFAULT_LOCALE: "es"
  NEXT_PUBLIC_DATALAB_DEFAULT_THEME: "dark"
  NEXT_PUBLIC_CONTACT_CAPTCHA_PROVIDER: "none"
  NEXT_PUBLIC_RECAPTCHA_SITE_KEY: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
  RECAPTCHA_SECRET_KEY: "6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe"
  RECAPTCHA_VERIFY_URL: "https://www.google.com/recaptcha/api/siteverify"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
